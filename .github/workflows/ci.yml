name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: python -m pip install --requirement tools/requirements.txt

      - name: Install clang-format
        run: |
          python -m pip install clang-format==19.1.7
          clang-format --version

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Check formatting
        run: cmake --build build --target format-check

      - name: Build
        run: cmake --build build --parallel

      - name: Run AST tests
        run: python tools/test.py test build/skard --command ast --tests-dir tests/ast --no-color

      - name: Run runtime tests
        run: python tools/test.py test build/skard --command run --tests-dir tests/run --no-color
